ACCEPT_KEYWORDS="~amd64"
ACCEPT_LICENSE="*"

COMMON_FLAGS="-O2 -march=native -pipe"

ADAFLAGS="${COMMON_FLAGS}"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

CONFIG_PROTECT="${CONFIG_PROTECT} /usr/share/applications/com.nextcloud.desktopclient.nextcloud.desktop"
CPU_FLAGS_X86="aes avx avx2 bmi1 bmi2 f16c fma3 mmx mmxext pclmul popcnt rdrand sse sse2 sse3 sse4_1 sse4_2 ssse3"
DISTDIR="/usr/portage/distfiles"
EMERGE_DEFAULT_OPTS="--ask --ask-enter-invalid --backtrack=9999 --binpkg-changed-deps=n --binpkg-respect-use=n --changed-deps-report --complete-graph --deep --jobs=2 --tree --usepkg --usepkg-exclude-live --verbose --verbose-conflicts --with-bdeps=y"
FEATURES="${FEATURES} buildpkg clean-logs compressdebug installsources splitdebug"
L10N="ar de en en-US id ru tr"
LC_MESSAGES="C.utf8"
LIBREOFFICE_EXTENSIONS="nlpsolver scripting-beanshell scripting-javascript"
MAKEOPTS="--jobs=8 --load-average=9"
NGINX_MODULES_HTTP="access fastcgi gzip rewrite ssl v2 v3"
PHP_TARGETS="php8-5"
PORTAGE_LOGDIR="/var/log/portage"
PORTDIR="/usr/portage"

